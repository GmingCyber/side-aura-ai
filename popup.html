<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA AI</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body>
    <div class="aura-container">
        <!-- Header -->
        <header class="aura-header">
            <div class="aura-logo-container">
                <svg class="aura-logo" viewBox="0 0 32 32" fill="none">
                    <defs>
                        <linearGradient id="aura-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="50%" stop-color="#8b5cf6"/>
                            <stop offset="100%" stop-color="#a855f7"/>
                        </linearGradient>
                    </defs>
                    <circle cx="16" cy="16" r="14" stroke="url(#aura-grad)" stroke-width="2" fill="none"/>
                    <path d="M16 8L20 16L16 24L12 16L16 8Z" fill="url(#aura-grad)"/>
                    <circle cx="16" cy="16" r="3" fill="url(#aura-grad)"/>
                </svg>
                <h1 class="aura-title">AURA AI</h1>
            </div>
            <div class="aura-header-actions">
                <button class="aura-icon-btn" id="aura-minimize-btn" title="Minimizar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
                </button>
                <button class="aura-icon-btn" id="aura-fullscreen-btn" title="Tela Cheia">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
                <button class="aura-icon-btn" id="aura-close-btn" title="Fechar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </header>

        <!-- Visual Area (Three.js) -->
        <div class="aura-visual-area">
            <div id="aura-canvas-container"></div>
            <p class="aura-welcome-text">Olá! Como posso ajudar você hoje?</p>
        </div>

        <!-- Chat Area -->
        <main class="aura-chat-area" id="aura-chat-messages">
            <!-- Messages will be injected here -->
            <div class="aura-message aura-message-ai">
                <div class="aura-message-header">AURA</div>
                <div class="aura-message-content">
                    Bem-vindo ao AURA AI. Sou seu assistente inteligente premium. Como posso ser útil?
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <div class="aura-input-container">
            <div class="aura-input-wrapper">
                <button class="aura-icon-btn" id="aura-attach-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <textarea class="aura-input" id="aura-user-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
                <button class="aura-send-btn" id="aura-send-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                </button>
            </div>
        </div>

        <!-- Footer Navigation -->
        <footer class="aura-footer">
            <a href="#" class="aura-nav-item active" id="nav-chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                <span>Chat</span>
            </a>
            <a href="#" class="aura-nav-item" id="nav-notes">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                <span>Notas</span>
            </a>
            <a href="#" class="aura-nav-item" id="nav-training">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10V6a2 2 0 00-2-2H4a2 2 0 00-2 2v12a2 2 0 002 2h10"/><path d="M18 14l4 4-4 4M22 18h-6"/></svg>
                <span>Treinar</span>
            </a>
            <a href="#" class="aura-nav-item" id="nav-settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Config</span>
            </a>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="lib/three.min.js"></script>
    <script src="scripts/effects/three-scene.js"></script>
    <script src="scripts/openrouter-client.js"></script>
    <script src="scripts/notes-manager.js"></script>
    <script src="scripts/aura-model-manager.js"></script>
    <script src="scripts/training-manager.js"></script>
    <script src="scripts/aura-leens.js"></script>
    <script src="scripts/ai-service.js"></script>
    <script src="popup.js"></script>
</body>
</html>
