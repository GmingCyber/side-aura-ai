<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA AI - Painel Lateral</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/animations.css">
</head>
<body>
    <div class="aura-container">
        <!-- Header -->
        <header class="aura-header">
            <div class="aura-logo-container">
                <div class="aura-logo-glow"></div>
                <span class="aura-title">AURA AI</span>
            </div>
            <div class="aura-header-actions">
                <button class="aura-icon-btn" id="aura-fullscreen-btn" title="Tela Cheia">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
                <button class="aura-icon-btn" id="aura-close-btn" title="Fechar">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
        </header>

        <!-- Visual Area (Three.js) -->
        <div class="aura-visual-area">
            <div id="aura-canvas-container"></div>
            <div class="aura-welcome-text">
                <p id="aura-greeting">Olá! Como posso ajudar você hoje?</p>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="aura-chat-area" id="aura-chat-messages">
            <!-- Mensagens serão injetadas aqui -->
        </div>

        <!-- Input Area -->
        <div class="aura-input-container">
            <div class="aura-input-wrapper">
                <button class="aura-action-btn" id="aura-attach-btn" title="Anexar">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
                </button>
                <textarea class="aura-input" id="aura-user-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
                <button class="aura-send-btn" id="aura-send-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>

        <!-- Footer Navigation -->
        <footer class="aura-footer">
            <a href="#" class="aura-nav-item active" id="nav-chat">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                <span>Chat</span>
            </a>
            <a href="#" class="aura-nav-item" id="nav-notes">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span>Notas</span>
            </a>
            <a href="#" class="aura-nav-item" id="nav-training">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.89 12.55L12 15.89l6.11-3.34c.66-.36.89-1.1.5-1.72-.39-.62-1.19-.81-1.82-.45L12 13.06l-4.79-2.61c-.63-.36-1.43-.17-1.82.45-.39.62-.16 1.36.5 1.72z"/></svg>
                <span>Treinar</span>
            </a>
            <a href="#" class="aura-nav-item" id="nav-settings">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span>Config</span>
            </a>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="lib/three.min.js"></script>
    <script src="scripts/effects/three-scene.js"></script>
    <script src="scripts/openrouter-client.js"></script>
    <script src="scripts/notes-manager.js"></script>
    <script src="scripts/aura-model-manager.js"></script>
    <script src="scripts/training-manager.js"></script>
    <script src="scripts/aura-leens.js"></script>
    <script src="scripts/ai-service.js"></script>
    <script src="popup.js"></script>
</body>
</html>
